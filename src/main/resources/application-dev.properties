# =========================================================
# DEV PROFILE — Local Development
# =========================================================

# =========================================================
# DATABASE CONFIGURATION (MySQL 8.4 — local)
# =========================================================
# JDBC URL format: jdbc:mysql://host:port/database?options
# createDatabaseIfNotExist=true  -> Creates DB automatically if missing
# useSSL=false                   -> Disables SSL for local dev
# serverTimezone=UTC             -> Prevents timezone mismatch errors
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# MySQL driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Show SQL in console (helpful for debugging during dev)
spring.jpa.show-sql=true

# In dev, use 'create' so Hibernate always creates tables from scratch on startup.
# (Hibernate 7.x + Spring Boot 4.x has a known issue where ddl-auto=update silently
# skips table creation on an empty database.)
# DataInitializer re-seeds the admin account on every startup, so data loss is fine.
spring.jpa.hibernate.ddl-auto=create

# =========================================================
# JWT CONFIGURATION (Dev only — NOT for production)
# =========================================================
# Base64-encoded 256-bit secret key (generate your own for prod!)
jwt.secret=dGhpc0lzQVNlY3JldEtleUZvckRldk9ubHlEb05vdFVzZUluUHJvZHVjdGlvbg==
jwt.expiration=86400000

# =========================================================
# LOGGING (set to DEBUG for detailed Spring Security logs)
# =========================================================
logging.level.org.springframework.security=DEBUG
