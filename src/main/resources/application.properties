spring.application.name=HostelMaintananceSystem

# =========================================================
# DATABASE CONFIGURATION (MySQL 8.4)
# =========================================================
# JDBC URL format: jdbc:mysql://host:port/database?options
# createDatabaseIfNotExist=true  -> Creates DB automatically if missing (dev only)
# useSSL=false                 -> Disables SSL for local dev (enable in production)
# serverTimezone=UTC           -> Prevents timezone mismatch errors
spring.datasource.url=jdbc:mysql://localhost:3306/hms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# MySQL driver class (not required in Spring Boot 2.7+ but explicit is safer)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / HIBERNATE CONFIGURATION
# =========================================================
# ddl-auto options:
#   none     -> Never touches schema (production default)
#   validate -> Validates schema matches entities, fails if mismatch
#   update   -> Creates/updates schema from entities (our dev choice)
#   create   -> Drops and recreates on every start (destroys data!)
#   create-drop -> Same as create, also drops on shutdown
spring.jpa.hibernate.ddl-auto=update

# MySQL dialect: tells Hibernate how to generate SQL for MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show SQL in console (great for learning)
spring.jpa.show-sql=true

# Format SQL with line breaks (easier to read)
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# SERVER CONFIGURATION
# =========================================================
server.port=8080

# =========================================================
# LOGGING (set to DEBUG for detailed Spring Security logs)
# =========================================================
logging.level.org.springframework.security=DEBUG
