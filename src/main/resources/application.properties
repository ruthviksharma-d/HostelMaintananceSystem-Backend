# =========================================================
# COMMON CONFIGURATION (shared across all profiles)
# =========================================================

spring.application.name=HostelMaintananceSystem

# Active profile: set via env variable or command line
# Default: dev (for local development)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =========================================================
# JPA / HIBERNATE CONFIGURATION
# =========================================================
# ddl-auto options:
#   none     -> Never touches schema (production default)
#   validate -> Validates schema matches entities, fails if mismatch
#   update   -> Creates/updates schema from entities (our dev choice)
#   create   -> Drops and recreates on every start (destroys data!)
#   create-drop -> Same as create, also drops on shutdown
spring.jpa.hibernate.ddl-auto=update

# MySQL dialect: tells Hibernate how to generate SQL for MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show SQL in console (override per profile)
spring.jpa.show-sql=false

# Format SQL with line breaks (easier to read)
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# SERVER CONFIGURATION
# =========================================================
server.port=8080

# =========================================================
# JWT CONFIGURATION
# =========================================================
# Secret key and expiration are set per profile (dev vs prod)
# jwt.secret=       -> set in profile-specific properties
# jwt.expiration=   -> set in profile-specific properties
