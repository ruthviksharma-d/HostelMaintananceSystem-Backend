# ===================================================================
# PRODUCTION PROFILE (application-prod.properties)
# Active when running with: --spring.profiles.active=prod
# ===================================================================

# 1. Server Configuration
# Usually behind a reverse proxy in prod (like Nginx), but we'll run on 8080 or port specified by environment
server.port=${PORT:8080}

# 2. Database Configuration (AWS RDS MySQL)
# These values MUST be passed as environment variables in production
# Example: export SPRING_DATASOURCE_URL=jdbc:mysql://my-rds-endpoint.aws.com:3306/hms_prod
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# 3. Hibernate Configuration
# NEVER use update/create in production! Use validate to ensure schema matches entity definitions.
# Schema changes should be managed by a tool like Flyway or Liquibase in prod.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 4. JWT Configuration
# MUST be a strong, randomly generated 256-bit+ key passed as environment variable
jwt.secret=${JWT_SECRET}
# Token expires in 1 day (86400000 ms)
jwt.expiration=86400000

# 5. Logging Configuration
# Only show warnings and errors to keep logs clean and save disk space
logging.level.root=WARN
logging.level.org.hms=INFO
